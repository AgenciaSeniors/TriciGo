name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    name: Deploy Web to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm turbo run build --filter=@tricigo/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: VPS diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "=== nghttpx config ==="
            cat /etc/nghttpx/nghttpx.conf 2>/dev/null || echo "no nghttpx.conf"
            echo "=== all nghttpx files ==="
            find /etc/nghttpx/ -type f 2>/dev/null | while read f; do echo "--- $f ---"; cat "$f"; done || true
            echo "=== nginx config ==="
            ls /etc/nginx/sites-enabled/ 2>/dev/null && cat /etc/nginx/sites-enabled/* 2>/dev/null || echo "no nginx sites"
            echo "=== caddy ==="
            cat /etc/caddy/Caddyfile 2>/dev/null || true
            echo "=== running proxies ==="
            systemctl list-units --type=service --state=running 2>/dev/null | grep -iE 'nginx|caddy|nghttpx|haproxy|traefik' || echo "none"
            echo "=== Ports ==="
            ss -tlnp | grep -E ':(80|443|300[0-9]|301[0-9])' || true
            echo "=== PM2 ==="
            pm2 list

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 60s
          source: 'apps/web/.next/standalone/,apps/web/.next/static/,apps/web/public/'
          target: '/tmp/tricigo-web-deploy'

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            APP_DIR=/var/www/tricigo-web
            DEPLOY_DIR=/tmp/tricigo-web-deploy/apps/web

            # Copy standalone build
            rsync -a --delete $DEPLOY_DIR/.next/standalone/ $APP_DIR/

            # Find the server.js entry point (monorepo standalone nests it)
            cd $APP_DIR
            if [ -f server.js ]; then
              ENTRY=server.js
              STATIC_DIR=$APP_DIR/.next/static
              PUBLIC_DIR=$APP_DIR/public
            elif [ -f apps/web/server.js ]; then
              ENTRY=apps/web/server.js
              STATIC_DIR=$APP_DIR/apps/web/.next/static
              PUBLIC_DIR=$APP_DIR/apps/web/public
            else
              echo "server.js not found!" && ls -la $APP_DIR && ls -la $APP_DIR/apps/web/ 2>/dev/null && exit 1
            fi

            # Copy static assets to the correct path relative to server.js
            mkdir -p $STATIC_DIR
            cp -r $DEPLOY_DIR/.next/static/* $STATIC_DIR/
            echo "Static files copied to: $STATIC_DIR"
            ls $STATIC_DIR/ | head -5

            # Copy public folder to the correct path
            mkdir -p $PUBLIC_DIR
            cp -r $DEPLOY_DIR/public/* $PUBLIC_DIR/ 2>/dev/null || true

            # Find a free port (3001 is used by gst, 3002 by admin)
            WEBPORT=3003
            # Check nghttpx/nginx config for expected backend port
            CFGPORT=$(grep -rhoP 'localhost:\K[0-9]+' /etc/nghttpx/ 2>/dev/null | sort -u | tr '\n' ' ' || echo "")
            echo "=== Reverse proxy backend ports: $CFGPORT ==="
            echo "=== Using port: $WEBPORT ==="

            # Stop and delete tricigo-web from PM2
            pm2 stop tricigo-web 2>/dev/null || true
            pm2 delete tricigo-web 2>/dev/null || true
            # Kill anything on our port
            fuser -k ${WEBPORT}/tcp 2>/dev/null || true
            sleep 1

            # Write .env with the correct port
            cat > $APP_DIR/.env << ENVEOF
            PORT=${WEBPORT}
            HOSTNAME=0.0.0.0
            ENVEOF

            # Start with PM2 using ecosystem file for reliable env passing
            cat > $APP_DIR/ecosystem.config.js << ECOEOF
            module.exports = {
              apps: [{
                name: 'tricigo-web',
                script: '${ENTRY}',
                cwd: '${APP_DIR}',
                env: {
                  PORT: ${WEBPORT},
                  HOSTNAME: '0.0.0.0',
                  NODE_ENV: 'production'
                }
              }]
            };
            ECOEOF
            cd $APP_DIR
            pm2 start ecosystem.config.js
            sleep 3
            pm2 logs tricigo-web --lines 20 --nostream || true
            pm2 save

            echo "=== Final status ==="
            pm2 list
            ss -tlnp | grep ":${WEBPORT} " || echo "WARNING: nothing listening on $WEBPORT"

            # Smoke test: check if the app responds
            echo "=== Smoke test ==="
            curl -sI http://localhost:${WEBPORT}/ 2>&1 | head -10 || echo "curl failed"
            echo "=== Page body (first 500 chars) ==="
            curl -s http://localhost:${WEBPORT}/ 2>&1 | head -c 500 || echo "curl failed"
            echo ""
            echo "=== Check .env content ==="
            cat $APP_DIR/.env 2>/dev/null || echo "no .env"
            echo "=== Check ecosystem ==="
            cat $APP_DIR/ecosystem.config.js 2>/dev/null || echo "no ecosystem"
            echo "=== Check NEXT_PUBLIC env in process ==="
            cat /proc/$(pm2 pid tricigo-web)/environ 2>/dev/null | tr '\0' '\n' | grep -i "NEXT_PUBLIC\|SUPABASE\|PORT\|NODE_ENV" || echo "could not read env"

            # Cleanup
            rm -rf /tmp/tricigo-web-deploy

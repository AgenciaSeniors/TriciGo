name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    name: Deploy Web to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm turbo run build --filter=@tricigo/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: 'apps/web/.next/standalone/,apps/web/.next/static/,apps/web/public/'
          target: '/tmp/tricigo-web-deploy'

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            APP_DIR=/var/www/tricigo-web
            DEPLOY_DIR=/tmp/tricigo-web-deploy/apps/web

            # Diagnostics: show what Nginx expects and what's on each port
            echo "=== Nginx proxy config ==="
            grep -r proxy_pass /etc/nginx/sites-enabled/ 2>/dev/null || echo "no nginx sites-enabled found"
            echo "=== Ports in use ==="
            ss -tlnp | grep -E ':(300[0-9]|301[0-9])' || echo "no ports 3000-3019 in use"
            echo "=== PM2 list ==="
            pm2 list

            # Copy standalone build
            rsync -a --delete $DEPLOY_DIR/.next/standalone/ $APP_DIR/

            # Copy static assets (not included in standalone)
            mkdir -p $APP_DIR/.next/static
            cp -r $DEPLOY_DIR/.next/static/* $APP_DIR/.next/static/

            # Copy public folder
            cp -r $DEPLOY_DIR/public $APP_DIR/public 2>/dev/null || true

            # Find the server.js entry point (monorepo standalone nests it)
            cd $APP_DIR
            if [ -f server.js ]; then
              ENTRY=server.js
            elif [ -f apps/web/server.js ]; then
              ENTRY=apps/web/server.js
            else
              echo "server.js not found!" && ls -la $APP_DIR && ls -la $APP_DIR/apps/web/ 2>/dev/null && exit 1
            fi

            # Detect port from Nginx config (fallback to 3001)
            WEBPORT=$(grep -r proxy_pass /etc/nginx/sites-enabled/ 2>/dev/null | grep -oP 'tricigo\.com.*?localhost:\K[0-9]+' || echo "")
            if [ -z "$WEBPORT" ]; then
              # Try broader search for any proxy to tricigo-web
              WEBPORT=$(grep -B5 -A5 'tricigo' /etc/nginx/sites-enabled/* 2>/dev/null | grep -oP 'proxy_pass\s+http://.*?:(\K[0-9]+)' | head -1 || echo "")
            fi
            if [ -z "$WEBPORT" ]; then
              WEBPORT=3001
            fi
            echo "=== Using port: $WEBPORT ==="

            # Stop and delete tricigo-web from PM2
            pm2 stop tricigo-web 2>/dev/null || true
            pm2 delete tricigo-web 2>/dev/null || true
            # Kill any orphan process on our port (but NOT other PM2 apps)
            PIDS=$(ss -tlnp | grep ":${WEBPORT} " | grep -oP 'pid=\K[0-9]+' || echo "")
            for PID in $PIDS; do
              # Only kill if it's a node process in our app dir
              CMDLINE=$(cat /proc/$PID/cmdline 2>/dev/null | tr '\0' ' ' || echo "")
              if echo "$CMDLINE" | grep -q "tricigo-web\|/var/www/tricigo-web"; then
                echo "Killing orphan tricigo-web process $PID"
                kill -9 $PID 2>/dev/null || true
              else
                echo "WARNING: Port $WEBPORT held by non-tricigo process $PID: $CMDLINE"
              fi
            done
            sleep 1

            # Verify port is free
            if ss -tlnp | grep -q ":${WEBPORT} "; then
              echo "ERROR: Port $WEBPORT still in use after cleanup:"
              ss -tlnp | grep ":${WEBPORT} "
              echo "Trying alternative port 3003..."
              WEBPORT=3003
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 1
            fi

            # Start with PM2
            cd $APP_DIR
            PORT=$WEBPORT HOSTNAME=0.0.0.0 pm2 start $ENTRY --name tricigo-web --update-env
            sleep 3
            pm2 logs tricigo-web --lines 20 --nostream || true
            pm2 save

            echo "=== Final status ==="
            pm2 list
            ss -tlnp | grep ":${WEBPORT} " || echo "WARNING: nothing listening on $WEBPORT"

            # Cleanup
            rm -rf /tmp/tricigo-web-deploy

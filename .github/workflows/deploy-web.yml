name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    name: Deploy Web to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm turbo run build --filter=@tricigo/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: 'apps/web/.next/standalone/,apps/web/.next/static/,apps/web/public/'
          target: '/tmp/tricigo-web-deploy'

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            APP_DIR=/var/www/tricigo-web
            DEPLOY_DIR=/tmp/tricigo-web-deploy/apps/web

            # Copy standalone build
            rsync -a --delete $DEPLOY_DIR/.next/standalone/ $APP_DIR/

            # Copy static assets (not included in standalone)
            mkdir -p $APP_DIR/.next/static
            cp -r $DEPLOY_DIR/.next/static/* $APP_DIR/.next/static/

            # Copy public folder
            cp -r $DEPLOY_DIR/public $APP_DIR/public 2>/dev/null || true

            # Find the server.js entry point (monorepo standalone nests it)
            cd $APP_DIR
            if [ -f server.js ]; then
              ENTRY=server.js
            elif [ -f apps/web/server.js ]; then
              ENTRY=apps/web/server.js
            else
              echo "server.js not found!" && ls -la $APP_DIR && ls -la $APP_DIR/apps/web/ 2>/dev/null && exit 1
            fi

            # Write .env for runtime
            cat > $APP_DIR/.env <<'ENVEOF'
            PORT=3001
            HOSTNAME=0.0.0.0
            ENVEOF

            # Restart with PM2
            pm2 delete tricigo-web 2>/dev/null || true
            cd $APP_DIR
            PORT=3001 HOSTNAME=0.0.0.0 pm2 start $ENTRY --name tricigo-web --update-env
            sleep 3
            pm2 logs tricigo-web --lines 20 --nostream || true
            pm2 save

            # Cleanup
            rm -rf /tmp/tricigo-web-deploy

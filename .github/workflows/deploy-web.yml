name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    name: Deploy Web to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm turbo run build --filter=@tricigo/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: 'apps/web/.next/standalone/,apps/web/.next/static/,apps/web/public/'
          target: '/tmp/tricigo-web-deploy'

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            APP_DIR=/var/www/tricigo-web
            DEPLOY_DIR=/tmp/tricigo-web-deploy/apps/web

            # Diagnostics: show what Nginx expects and what's on each port
            echo "=== Nginx proxy config ==="
            grep -r proxy_pass /etc/nginx/sites-enabled/ 2>/dev/null || echo "no nginx sites-enabled found"
            echo "=== Ports in use ==="
            ss -tlnp | grep -E ':(300[0-9]|301[0-9])' || echo "no ports 3000-3019 in use"
            echo "=== PM2 list ==="
            pm2 list

            # Copy standalone build
            rsync -a --delete $DEPLOY_DIR/.next/standalone/ $APP_DIR/

            # Copy static assets (not included in standalone)
            mkdir -p $APP_DIR/.next/static
            cp -r $DEPLOY_DIR/.next/static/* $APP_DIR/.next/static/

            # Copy public folder
            cp -r $DEPLOY_DIR/public $APP_DIR/public 2>/dev/null || true

            # Find the server.js entry point (monorepo standalone nests it)
            cd $APP_DIR
            if [ -f server.js ]; then
              ENTRY=server.js
            elif [ -f apps/web/server.js ]; then
              ENTRY=apps/web/server.js
            else
              echo "server.js not found!" && ls -la $APP_DIR && ls -la $APP_DIR/apps/web/ 2>/dev/null && exit 1
            fi

            # Find a free port (3001 is used by gst, 3002 by admin)
            WEBPORT=3003
            # Check nghttpx/nginx config for expected backend port
            CFGPORT=$(grep -rhoP 'localhost:\K[0-9]+' /etc/nghttpx/ 2>/dev/null | sort -u | tr '\n' ' ' || echo "")
            echo "=== Reverse proxy backend ports: $CFGPORT ==="
            echo "=== Using port: $WEBPORT ==="

            # Stop and delete tricigo-web from PM2
            pm2 stop tricigo-web 2>/dev/null || true
            pm2 delete tricigo-web 2>/dev/null || true
            # Kill anything on our port
            fuser -k ${WEBPORT}/tcp 2>/dev/null || true
            sleep 1

            # Write .env with the correct port
            cat > $APP_DIR/.env << ENVEOF
            PORT=${WEBPORT}
            HOSTNAME=0.0.0.0
            ENVEOF

            # Start with PM2 using ecosystem file for reliable env passing
            cat > $APP_DIR/ecosystem.config.js << ECOEOF
            module.exports = {
              apps: [{
                name: 'tricigo-web',
                script: '${ENTRY}',
                cwd: '${APP_DIR}',
                env: {
                  PORT: ${WEBPORT},
                  HOSTNAME: '0.0.0.0',
                  NODE_ENV: 'production'
                }
              }]
            };
            ECOEOF
            cd $APP_DIR
            pm2 start ecosystem.config.js
            sleep 3
            pm2 logs tricigo-web --lines 20 --nostream || true
            pm2 save

            echo "=== Final status ==="
            pm2 list
            ss -tlnp | grep ":${WEBPORT} " || echo "WARNING: nothing listening on $WEBPORT"

            # Cleanup
            rm -rf /tmp/tricigo-web-deploy

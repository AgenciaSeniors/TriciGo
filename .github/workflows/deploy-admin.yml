name: Deploy Admin

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - '.github/workflows/deploy-admin.yml'

jobs:
  deploy:
    name: Deploy Admin to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm turbo run build --filter=@tricigo/admin
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: 'apps/admin/.next/standalone/,apps/admin/.next/static/,apps/admin/public/'
          target: '/tmp/tricigo-admin-deploy'

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            APP_DIR=/var/www/tricigo-admin
            DEPLOY_DIR=/tmp/tricigo-admin-deploy/apps/admin
            mkdir -p $APP_DIR/.next/static

            # Copy standalone build
            rsync -a --delete $DEPLOY_DIR/.next/standalone/ $APP_DIR/

            # Copy static assets (not included in standalone)
            cp -r $DEPLOY_DIR/.next/static/* $APP_DIR/.next/static/

            # Copy public folder
            cp -r $DEPLOY_DIR/public $APP_DIR/public 2>/dev/null || true

            # Restart with PM2
            cd $APP_DIR
            pm2 restart tricigo-admin 2>/dev/null || pm2 start server.js --name tricigo-admin --env PORT=3000
            pm2 save

            # Cleanup
            rm -rf /tmp/tricigo-admin-deploy

name: EAS Build

on:
  push:
    tags:
      - 'client-v*'
      - 'driver-v*'

jobs:
  build-client:
    name: Build Client App
    if: startsWith(github.ref, 'refs/tags/client-v')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android (preview APK)
        run: eas build --platform android --profile preview --non-interactive
        working-directory: apps/client

      - name: Build iOS (production)
        run: eas build --platform ios --profile production --non-interactive
        working-directory: apps/client

  build-driver:
    name: Build Driver App
    if: startsWith(github.ref, 'refs/tags/driver-v')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android (preview APK)
        run: eas build --platform android --profile preview --non-interactive
        working-directory: apps/driver

      - name: Build iOS (production)
        run: eas build --platform ios --profile production --non-interactive
        working-directory: apps/driver
